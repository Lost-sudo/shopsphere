services:
    db:
        image: postgres:15-alpine
        container_name: shopsphere-db
        restart: always
        env_file:
            - ./server/.env
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        container_name: shopsphere-redis
        restart: always
        ports:
            - "6379:6379"

    backend:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        container_name: shopsphere-backend
        ports:
            - "${BACKEND_PORT}:${BACKEND_PORT}"
            - "5555:5555"
        volumes:
            - ./server:/app
            - /app/node_modules
        env_file:
            - ./server/.env
        environment:
            - PORT=${BACKEND_PORT}
        depends_on:
            - db
            - redis

    frontend:
        build:
            context: ./client
            dockerfile: Dockerfile.dev
        container_name: shopsphere-frontend
        ports:
            - "${FRONTEND_PORT}:${FRONTEND_PORT}"
        volumes:
            - ./client:/app
            - /app/node_modules
            - /app/.next
        env_file:
            - ./client/.env
        environment:
            - PORT=${FRONTEND_PORT}
        depends_on:
            - backend

volumes:
    postgres_data:
